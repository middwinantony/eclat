name: Build and Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "deploy-to-prod" to confirm'
        required: true

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 524419234223.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: eclat-prod
  APP_RUNNER_SERVICE: eclat-prod

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Validate manual trigger confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "deploy-to-prod" ]; then
            echo "Confirmation failed — you must type exactly: deploy-to-prod"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

  build-and-deploy:
    name: Build Docker image and deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::524419234223:role/github-actions-eclat-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

          docker build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_PUSHER_KEY=${{ secrets.NEXT_PUBLIC_PUSHER_KEY }} \
            --build-arg NEXT_PUBLIC_PUSHER_CLUSTER=ap2 \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_PROD }} \
            --build-arg SKIP_ENV_VALIDATION=1 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG} \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}

      - name: Deploy to App Runner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_RUNNER_SERVICE }}'].ServiceArn" \
            --output text)
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
          echo "Deployment started for service: $SERVICE_ARN"

      - name: Wait for deployment and smoke test
        run: |
          echo "Waiting 90 seconds for App Runner to deploy..."
          sleep 90
          curl --fail --retry 5 --retry-delay 15 \
            ${{ secrets.PROD_APP_RUNNER_URL }}/api/health
          echo "Smoke test passed"
